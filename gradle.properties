# Meningkatkan memori compiler Gradle agar tidak kehabisan RAM saat memproses library native (FFmpeg & jLibtorrent)
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC
org.gradle.caching=true
org.gradle.parallel=true

# Wajib untuk dependensi AndroidX & Compose modern
android.useAndroidX=true
android.enableJetifier=true
